<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForgeSight Noise Filtering View</title>
  <link rel="stylesheet" href="noisefil.css">
</head>
<body>
  <header class="nf-topbar">
    <div>
      <h1>Smart Noise Filtering Visualization</h1>
      <p>Raw data vs filtered data vs AI interpreted signal for all machines</p>
    </div>
    <div class="nf-actions">
      <label for="nf-metric">Metric</label>
      <select id="nf-metric">
        <option value="vibration_mm_s">Vibration (mm/s)</option>
        <option value="temperature_C">Temperature (deg C)</option>
        <option value="rpm">RPM</option>
        <option value="current_A">Current (A)</option>
      </select>
      <button id="nf-refresh" type="button">Refresh</button>
      <a href="history.html">Back to History</a>
      <a href="/">Live Dashboard</a>
    </div>
  </header>

  <main class="nf-main">
    <section class="nf-toggle-row">
      <label class="nf-toggle">
        <input type="checkbox" id="show-false-spikes" checked>
        <span>Show how AI removed false spikes</span>
      </label>
      <div id="nf-refresh-time" class="nf-refresh-time">Last refresh: -</div>
    </section>

    <section class="nf-legend">
      <span><i class="dot raw"></i>Raw data</span>
      <span><i class="dot filtered"></i>Filtered data</span>
      <span><i class="dot ai"></i>AI interpreted signal</span>
      <span><i class="dot spikes"></i>False spikes removed</span>
    </section>

    <section id="nf-grid" class="nf-grid"></section>
  </main>

  <script src="noisefil.js?v=3"></script>
</body>
</html>
