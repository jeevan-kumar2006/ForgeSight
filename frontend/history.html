<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForgeSight History Dashboard</title>
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <header class="history-topbar">
    <div class="title-wrap">
      <h1>ForgeSight History Dashboard</h1>
      <p>All machines from earliest available reading to latest checkpoint</p>
    </div>
    <div class="top-actions">
      <label for="metric-select">Metric</label>
      <select id="metric-select">
        <option value="temperature_C">Temperature (deg C)</option>
        <option value="vibration_mm_s">Vibration (mm/s)</option>
        <option value="rpm">RPM</option>
        <option value="current_A">Current (A)</option>
      </select>
      <button id="refresh-history" type="button">Refresh Trends</button>
      <a class="noise-link" href="noisefil.html">Noise Filtering View</a>
      <a class="back-link" href="/">Back to Live Dashboard</a>
    </div>
  </header>

  <main class="history-main">
    <section class="history-meta">
      <div class="meta-item"><span>History Window:</span> <strong id="window-range">Loading...</strong></div>
      <div class="meta-item"><span>Total Samples per Machine:</span> <strong id="sample-count">-</strong></div>
      <div class="meta-item"><span>Last Trend Refresh:</span> <strong id="last-refresh">-</strong></div>
    </section>

    <section class="chart-grid" id="chart-grid"></section>

  </main>

  <script src="history.js?v=5"></script>
</body>
</html>
